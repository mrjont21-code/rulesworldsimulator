name: Harvest World Lore (Monthly Refresh - Phần 2)

# PHẦN 2 — cập nhật gia tăng: chỉ cào bài viết mới/thay đổi kể từ lần
# refresh trước (dùng touched-timestamp cho Orion's Arm/Speculative Evo,
# content-hash cho Project Rho). Chạy tự động vào ngày cuối cùng mỗi tháng
# lúc 02:00 UTC. cron "28-31" khớp mọi ngày có thể là cuối tháng; job
# check_last_day lọc lại để chỉ thực sự chạy đúng 1 lần/tháng.
# Có thể chạy tay bất cứ lúc nào để refresh ngay lập tức.
on:
  schedule:
    - cron: '0 2 28-31 * *'
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Bỏ qua bước scrape (dùng data cũ từ artifact)'
        required: false
        default: false
        type: boolean

jobs:
  check_last_day:
    name: Check last day of month
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tomorrow=$(date -u -d "+1 day" +%d)
          if [ "$tomorrow" = "01" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  harvest:
    needs: check_last_day
    if: needs.check_last_day.outputs.should_run == 'true'
    uses: ./.github/workflows/harvest-core.yml
    with:
      skip_scrape: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_scrape || false }}
      mode: incremental
    secrets: inherit
