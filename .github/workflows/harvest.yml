name: Harvest World Lore

on:
  schedule:
    # Ngày 1 hàng tháng lúc 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Bỏ qua bước scrape (dùng data cũ từ artifact)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

# Ngăn 2 workflow chạy cùng lúc (tránh conflict MongoDB)
concurrency:
  group: harvest-world-lore
  cancel-in-progress: false

jobs:

  # ============================================================
  # JOB 1A: Scrape Orion's Arm (~5 phút)
  # ============================================================
  scrape-orions:
    if: ${{ github.event.inputs.skip_scrape != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài dependencies
        run: pip install -r requirements.txt

      - name: Scrape Orion's Arm
        run: python main.py --scrape orions_arm

      - name: Upload raw data
        uses: actions/upload-artifact@v4
        with:
          name: raw-orions
          path: data/raw_orions.json
          retention-days: 3

  # ============================================================
  # JOB 1B: Scrape Speculative Evolution (~10 phút)
  # ============================================================
  scrape-spec-evo:
    if: ${{ github.event.inputs.skip_scrape != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài dependencies
        run: pip install -r requirements.txt

      - name: Scrape Speculative Evolution
        run: python main.py --scrape spec_evo

      - name: Upload raw data
        uses: actions/upload-artifact@v4
        with:
          name: raw-spec-evo
          path: data/raw_spec_evo.json
          retention-days: 3

  # ============================================================
  # JOB 1C: Scrape Project Rho (~3 phút)
  # ============================================================
  scrape-project-rho:
    if: ${{ github.event.inputs.skip_scrape != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài dependencies
        run: pip install -r requirements.txt

      - name: Scrape Project Rho
        run: python main.py --scrape project_rho

      - name: Upload raw data
        uses: actions/upload-artifact@v4
        with:
          name: raw-project-rho
          path: data/raw_project_rho.json
          retention-days: 3

  # ============================================================
  # JOB 2: Tính số batches cần thiết
  # ============================================================
  plan-batches:
    needs: [scrape-orions, scrape-spec-evo, scrape-project-rho]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      batch_ids: ${{ steps.plan.outputs.batch_ids }}
      n_batches: ${{ steps.plan.outputs.n_batches }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Download raw data
        uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: data/raw-dl/

      - name: Flatten raw files vào data/
        run: |
          mkdir -p data
          mkdir -p data/raw-dl
          find data/raw-dl -name "raw_*.json" -exec mv {} data/ \; 2>/dev/null || true
          ls -la data/raw_*.json 2>/dev/null || echo "CẢNH BÁO: Không có raw file!"

      - name: Tính số batches
        id: plan
        run: |
          output=$(python main.py --count-batches)
          echo "$output"
          n=$(echo "$output" | grep N_BATCHES | cut -d= -f2)
          echo "n_batches=$n" >> $GITHUB_OUTPUT
          # Tạo JSON array: [0, 1, 2, ..., n-1]
          ids=$(python3 -c "import json; print(json.dumps(list(range($n))))")
          echo "batch_ids=$ids" >> $GITHUB_OUTPUT

  # ============================================================
  # JOB 3: LLM Extraction - matrix song song (tối đa 20 jobs đồng thời)
  # Mỗi job xử lý 15 articles, chạy ≤ 25 phút với 7 key xoay vòng
  # ============================================================
  extract-batch:
    needs: plan-batches
    if: needs.plan-batches.outputs.n_batches != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      matrix:
        batch_id: ${{ fromJson(needs.plan-batches.outputs.batch_ids) }}
      fail-fast: false
      max-parallel: 7  # song song tối đa = số key (tránh 429 chéo)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Download raw data
        uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: data/raw-dl/

      - name: Flatten raw files vào data/
        run: |
          mkdir -p data
          mkdir -p data/raw-dl
          find data/raw-dl -name "raw_*.json" -exec mv {} data/ \; 2>/dev/null || true
          ls -la data/raw_*.json 2>/dev/null || echo "CẢNH BÁO: Không có raw file!"

      - name: Extract batch ${{ matrix.batch_id }}
        env:
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
          GEMINI_KEY_6: ${{ secrets.GEMINI_KEY_6 }}
          GEMINI_KEY_7: ${{ secrets.GEMINI_KEY_7 }}
        run: python main.py --extract-batch ${{ matrix.batch_id }}

      - name: Upload batch result
        uses: actions/upload-artifact@v4
        if: always()  # upload dù extract có lỗi một phần
        with:
          name: extracted-batch-${{ matrix.batch_id }}
          path: data/extracted_batch_${{ matrix.batch_id }}.json
          retention-days: 3

  # ============================================================
  # JOB 4: Normalize + Upload MongoDB (~5 phút)
  # ============================================================
  finalize:
    needs: extract-batch
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # download-artifact v4 với nhiều artifact tên khác nhau sẽ tạo subfolder
      # mỗi artifact: data/extracted-batch-0/extracted_batch_0.json
      # Dùng path gốc rồi flatten thủ công vào data/
      - name: Download tất cả extracted batches
        uses: actions/download-artifact@v4
        with:
          pattern: extracted-batch-*
          path: data/batches-raw/

      # Flatten: di chuyển tất cả extracted_batch_*.json vào data/
      - name: Flatten batch files vào data/
        run: |
          mkdir -p data
          mkdir -p data/batches-raw
          find data/batches-raw -name "extracted_batch_*.json" -exec mv {} data/ \; 2>/dev/null || true
          echo "=== Files trong data/ ==="
          ls -la data/extracted_batch_*.json 2>/dev/null || echo "CẢNH BÁO: Không tìm thấy file!"
          n=$(ls data/extracted_batch_*.json 2>/dev/null | wc -l)
          echo "Tổng số batch files: $n"
          echo "n_files=$n" >> "$GITHUB_ENV"

      - name: Normalize và upload MongoDB
        if: env.n_files != '0'
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python main.py --finalize

      - name: Không có batch mới
        if: env.n_files == '0'
        run: echo "⚠️ Không có extracted batch nào — bỏ qua finalize (không có nội dung mới tháng này)." >> $GITHUB_STEP_SUMMARY

      - name: Upload JSON master (artifact backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biology-rules-final-${{ github.run_id }}
          path: data/biology_rules_final.json
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          echo "## ✅ Harvest Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY
          if [ -f data/biology_rules_final.json ]; then
            rules=$(python3 -c "import json; d=json.load(open('data/biology_rules_final.json')); print(d['metadata']['total_rules'])")
            echo "- Rules this run: $rules" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ biology_rules_final.json không tồn tại" >> $GITHUB_STEP_SUMMARY
          fi
