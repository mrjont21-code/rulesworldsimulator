name: Dọn Rác & Xóa Sạch MongoDB

on:
  # Chỉ cho phép chạy thủ công để tránh tai nạn
  workflow_dispatch:

jobs:
  wipe-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cài đặt thư viện
        run: pip install pymongo

      - name: 🧨 Kích hoạt quy trình dọn dẹp
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python -c '
          import os
          from pymongo import MongoClient

          print("🚨 BẮT ĐẦU QUÁ TRÌNH DỌN DẸP MONGODB 🚨")
          
          uri = os.environ.get("MONGODB_URI")
          if not uri:
              print("❌ LỖI: Không tìm thấy MONGODB_URI.")
              exit(1)
              
          client = MongoClient(uri)

          # 1. Các Database hệ thống của MongoDB (Tuyệt đối không đụng vào)
          system_dbs = ["admin", "config", "local"]

          # 2. Các Database cốt lõi của bạn (Được bảo vệ để không mất cấu hình game/thế giới)
          protected_dbs = ["chimera_permanent", "sample_mflix"]

          try:
              db_names = client.list_database_names()
          except Exception as e:
              print(f"⚠️ Không có quyền quét toàn bộ Cluster: {e}")
              print("Tiến hành kiểm tra các Database thông dụng...")
              db_names = ["world_lore_db", "rulesworld", "chimera_purgatory", "chimera_canon", "test"]

          deleted_count = 0
          target_collection = "human_comedy_tropes"

          # 3. Tiến hành càn quét tập trung vào collection gây lỗi E11000
          for db_name in db_names:
              if db_name in system_dbs or db_name in protected_dbs:
                  continue

              db = client[db_name]
              
              try:
                  collections = db.list_collection_names()
                  if target_collection in collections:
                      print(f"\n🗑️ Đang truy cập Database: [{db_name}]...")
                      db.drop_collection(target_collection)
                      deleted_count += 1
                      print(f"   💥 Đã xóa sạch bảng: {target_collection} để dọn đường tạo Unique Index.")
              except Exception as e:
                  print(f"   ❌ Lỗi khi dọn dẹp {db_name}: {e}")

          if deleted_count == 0:
              print(f"\nℹ️ Không tìm thấy bảng {target_collection} nào bị trùng lặp. Database đã sạch.")
          else:
              print(f"\n✅ HOÀN TẤT! Đã dọn dẹp thành công {deleted_count} bảng rác.")
          '
