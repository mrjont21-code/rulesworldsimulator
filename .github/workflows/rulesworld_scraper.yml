name: Rulesworld Scraper Pipeline

on:
  # Cho phép chạy thủ công
  workflow_dispatch:
    inputs:
      max_loops:
        description: 'Số vòng Pomodoro tối đa (Mặc định: 8 vòng ~ 5.3 giờ)'
        required: false
        default: '8'
        
  # Hoặc chạy tự động hàng ngày
  schedule:
    - cron: '0 2 * * *' # Chạy lúc 2h sáng UTC mỗi ngày

# Cấp quyền ghi để push JSON lên repo
permissions:
  contents: write

env:
  # KHẮC PHỤC LỖI NODE 20 DEPRECATED
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  PYTHONUNBUFFERED: '1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          # BẮT BUỘC: Lấy toàn bộ lịch sử Git để có thể thực hiện lệnh `git pull --rebase`
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml pymongo pdfplumber
          # Cài Playwright + Chromium headless
          pip install playwright
          playwright install chromium --with-deps

      - name: 🚀 Run Scraper Pipeline
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Lấy giá trị MAX_LOOPS từ input workflow (nếu có), nếu không có thì dùng mặc định 8
          if [ -z "${{ github.event.inputs.max_loops }}" ]; then
            export MAX_LOOPS=8
          else
            export MAX_LOOPS=${{ github.event.inputs.max_loops }}
          fi

          echo "⏱️ MAX_LOOPS=$MAX_LOOPS"
          
          # Chạy pipeline
          python main.py --loop
          
      - name: 🛟 Phao cứu sinh: Lưu file thành file nén ZIP (Artifact)
        if: always() # Luôn chạy bước này kể cả khi pipeline phía trên có bị crash
        uses: actions/upload-artifact@v4
        with:
          name: rulesworld-scraped-data-backup
          path: |
            keyword_states/
            data/
            blackbook.json
          retention-days: 7 # Giữ file zip trên server GitHub trong 7 ngày

      - name: 💾 Commit & Push Generated JSON Data
        if: always() # Luôn chạy bước này kể cả khi scrape bị lỗi
        run: |
          # Ép chuyển về thư mục gốc của GitHub Workspace
          cd $GITHUB_WORKSPACE
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "📂 Đang kiểm tra thay đổi trong: $(pwd)"
          
          # Thêm các file/thư mục cần commit (bỏ qua lỗi nếu chưa tồn tại)
          git add keyword_states/ data/ blackbook.json 2>/dev/null || true
          
          # Kiểm tra có file nào cần commit không
          if git status --porcelain | grep -qE '^[MADRC]'; then
            echo "📝 Phát hiện dữ liệu mới, đang commit..."
            git commit -m "🤖 [Auto] Update scraper data - $(date +'%Y-%m-%d %H:%M UTC')"
            
            # Ưu tiên dùng GHT_PAT_RULES. Nếu không có, tự lùi về GITHUB_TOKEN.
            TOKEN="${{ secrets.GHT_PAT_RULES }}"
            if [ -z "$TOKEN" ]; then
              TOKEN="${{ secrets.GITHUB_TOKEN }}"
              echo "⚠️ Không tìm thấy GHT_PAT_RULES, sẽ sử dụng GITHUB_TOKEN mặc định."
            fi
            
            git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}"
            
            echo "🔄 Đang đồng bộ với remote để tránh lỗi xung đột (fetch first)..."
            # Kéo code trên remote về và đặt commit local lên trên
            git pull --rebase origin ${{ github.ref_name }}
            
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Push thành công!"
          else
            echo "✅ Không có dữ liệu JSON mới để push."
          fi
