name: Rulesworld Scraper Pipeline

on:
  # Cho phép chạy thủ công
  workflow_dispatch:
    inputs:
      max_loops:
        description: 'Số vòng Pomodoro tối đa (Mặc định: 8 vòng ~ 5.3 giờ)'
        required: false
        default: '8'
        
  # Hoặc chạy tự động hàng ngày
  schedule:
    - cron: '0 2 * * *' # Chạy lúc 2h sáng UTC mỗi ngày

# Cấp quyền ghi để push JSON lên repo
permissions:
  contents: write

env:
  # KHẮC PHỤC LỖI NODE 20 DEPRECATED
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  PYTHONUNBUFFERED: '1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        # ĐÃ BỎ token ở đây. Sẽ dùng GITHUB_TOKEN mặc định của GitHub

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml pymongo pdfplumber
          # Cài Playwright + Chromium headless
          pip install playwright
          playwright install chromium --with-deps

      - name: 🚀 Run Scraper Pipeline
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Chạy pipeline
          python main.py --loop
        env:
          MAX_LOOPS: ${{ github.event.inputs.max_loops || '8' }}

      - name: 💾 Commit & Push Generated JSON Data
        if: always() # Luôn chạy bước này kể cả khi scrape bị lỗi
        run: |
          # Ép chuyển về thư mục gốc của GitHub Workspace
          cd $GITHUB_WORKSPACE
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "📂 Đang kiểm tra thay đổi trong: $(pwd)"
          
          # Thêm các file/thư mục cần commit (bỏ qua lỗi nếu chưa tồn tại)
          git add keyword_states/ data/ blackbook.json 2>/dev/null || true
          
          # Kiểm tra có file nào cần commit không
          if git status --porcelain | grep -qE '^[MADRC]'; then
            echo "📝 Phát hiện dữ liệu mới, đang commit..."
            git commit -m "🤖 [Auto] Update scraper data - $(date +'%Y-%m-%d %H:%M UTC')"
            
            # Dùng GITHUB_TOKEN mặc định để push (KHÔNG CẦN TỰ TẠO PAT NỮA)
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "HEAD:${{ github.ref }}"
            echo "✅ Push thành công!"
          else
            echo "✅ Không có dữ liệu JSON mới để push."
          fi
