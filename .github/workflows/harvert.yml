name: Harvest World Lore

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run harvester
        env:
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
          GEMINI_KEY_6: ${{ secrets.GEMINI_KEY_6 }}
          GEMINI_KEY_7: ${{ secrets.GEMINI_KEY_7 }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python main.py

      - name: Upload raw data artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-articles
          path: data/raw_articles.json

      - name: Upload final rules artifact
        uses: actions/upload-artifact@v4
        with:
          name: biology-rules-final
          path: data/biology_rules_final.json
