name: Debug Sources (Khảo sát địa hình)

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Chạy Radar Debug
        run: python debug_sources.py

      - name: In kết quả ra log
        run: |
          echo "=== NỘI DUNG debug_results.json ==="
          cat debug_results.json

      - name: Upload kết quả
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-results-${{ github.run_id }}
          path: debug_results.json
          retention-days: 7
