name: Harvest World Lore (Initial Run)

# ============================================================
# PHẦN 1: BASELINE HARVEST (chạy 1 lần thủ công)
# ============================================================
# Chạy 1 lần để harvest toàn bộ dữ liệu ban đầu từ 3 nguồn:
#   - Orion's Arm (MediaWiki API)
#   - Speculative Evolution (Fandom MediaWiki API)
#   - Project Rho (HTML scraping)
#
# Luôn scrape đầy đủ (không có tùy chọn skip_scrape) vì đây là
# lần đầu, DB chưa có gì để so sánh/incremental.
#
# Cách chạy:
#   GitHub → Actions → "Harvest World Lore (Initial Run)"
#   → Run workflow → Chờ ~30-60 phút
# ============================================================

on:
  workflow_dispatch: {}

jobs:
  harvest:
    uses: ./.github/workflows/harvest-core.yml
    with:
      skip_scrape: false
      mode: full
    secrets: inherit
