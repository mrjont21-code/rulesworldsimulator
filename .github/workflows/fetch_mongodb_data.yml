name: Hút Trọn Ổ Dữ Liệu Cào

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vacuum-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cài đặt thư viện
        run: pip install pymongo

      - name: 📝 Tạo Máy Hút Dữ Liệu Thông Minh
        run: |
          cat << 'EOF' > smart_vacuum.py
          import os, json
          from pymongo import MongoClient

          uri = os.environ.get("MONGODB_URI")
          client = MongoClient(uri)

          all_scraped_data = []

          # Thử lấy danh sách DB, nếu bị chặn quyền thì dùng fallback
          try:
              db_names = client.list_database_names()
          except:
              try:
                  db_names = [client.get_default_database().name]
              except:
                  db_names = ["world_lore_db", "chimera_permanent", "chimera_canon"]

          # Quét qua toàn bộ các Database
          for db_name in db_names:
              if db_name in ["admin", "config", "local", "sample_mflix"]: continue
              
              db = client[db_name]
              try:
                  for coll_name in db.list_collection_names():
                      # Bỏ qua các bảng cấu hình game đã biết
                      if coll_name in ["used_keywords", "world_snapshots", "world_map", "voice_mapping", "archetypes", "world_history_founding", "character_states"]:
                          continue
                      
                      docs = list(db[coll_name].find({}, {"_id": 0}))
                      if not docs: continue
                      
                      # Bắt mạch: Nếu data có chứa các trường đặc trưng của cỗ máy cào
                      sample = docs[0]
                      if any(k in sample for k in ["url", "content", "content_hash", "keyword"]):
                          print(f"🎯 TÌM THẤY MỎ VÀNG: Database [{db_name}] -> Bảng [{coll_name}] chứa {len(docs)} bản ghi!")
                          all_scraped_data.extend(docs)
              except Exception as e:
                  print(f"Bỏ qua DB {db_name} do lỗi: {e}")

          os.makedirs("data", exist_ok=True)
          with open("data/scraped_golden_data.json", "w", encoding="utf-8") as f:
              json.dump(all_scraped_data, f, ensure_ascii=False, indent=4, default=str)

          print(f"✅ ĐÃ HÚT THÀNH CÔNG TỔNG CỘNG {len(all_scraped_data)} BẢN GHI!")
          EOF

      - name: 🧲 Chạy Máy Hút
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python smart_vacuum.py

      - name: 🛟 Phao cứu sinh (Lưu file ZIP)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-scraped-data
          path: data/
          retention-days: 7

      - name: 💾 Commit Lên GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f data/scraped_golden_data.json 2>/dev/null || true
          
          if git status --porcelain | grep -qE '^[MADRC]'; then
            git commit -m "🤖 [Auto] Hút thành công dữ liệu cào"
            
            TOKEN="${{ secrets.GHT_PAT_RULES }}"
            if [ -z "$TOKEN" ]; then
              TOKEN="${{ secrets.GITHUB_TOKEN }}"
            fi
            
            git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "✅ Dữ liệu không đổi."
          fi
