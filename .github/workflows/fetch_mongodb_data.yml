name: Lấy 11 Luật Hóa Sinh

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-direct:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cài đặt thư viện
        run: pip install pymongo

      - name: 📝 Tạo Script Python Độc Lập
        run: |
          cat << 'EOF' > fetch_rules.py
          import os, json
          from pymongo import MongoClient

          uri = os.environ.get("MONGODB_URI")
          client = MongoClient(uri)

          # Đích danh chui thẳng vào nhà rulesworld, không cần quét
          db = client["rulesworld"]
          rules = list(db["biology_rules"].find({}, {"_id": 0}))

          os.makedirs("data", exist_ok=True)
          with open("data/11_biology_rules.json", "w", encoding="utf-8") as f:
              json.dump(rules, f, ensure_ascii=False, indent=4, default=str)

          print(f"✅ BẮT ĐƯỢC {len(rules)} QUY LUẬT TỪ DATABASE RULESWORLD!")
          EOF

      - name: 🧲 Chạy Script Lấy Dữ Liệu
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python fetch_rules.py

      - name: 🛟 Phao cứu sinh (Lưu file ZIP)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 11-biology-rules
          path: data/
          retention-days: 7

      - name: 💾 Commit Lên GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f data/11_biology_rules.json
          
          if git status --porcelain | grep -qE '^[MADRC]'; then
            git commit -m "🤖 [Auto] Bắt thành công 11 luật hóa sinh"
            
            TOKEN="${{ secrets.GHT_PAT_RULES }}"
            if [ -z "$TOKEN" ]; then
              TOKEN="${{ secrets.GITHUB_TOKEN }}"
            fi
            
            git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "✅ Dữ liệu không đổi."
          fi
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-scan-results
          path: data/
          retention-days: 7

      - name: 💾 Commit & Push Kết Quả Lên GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ĐÃ SỬA: Gom toàn bộ thư mục data thay vì chỉ định đích danh tên file
          git add -f data/ 2>/dev/null || true
          
          if git status --porcelain | grep -qE '^[MADRC]'; then
            echo "📝 Có dữ liệu mới từ MongoDB, đang commit..."
            git commit -m "🤖 [Auto] Cập nhật Checklist từ MongoDB - $(date +'%Y-%m-%d %H:%M UTC')"
            
            TOKEN="${{ secrets.GHT_PAT_RULES }}"
            if [ -z "$TOKEN" ]; then
              TOKEN="${{ secrets.GITHUB_TOKEN }}"
            fi
            
            git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}"
            
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
            
            echo "✅ Dữ liệu đã được push lên nhánh chính!"
          else
            echo "✅ Dữ liệu trên MongoDB không có gì mới so với file hiện tại."
          fi
