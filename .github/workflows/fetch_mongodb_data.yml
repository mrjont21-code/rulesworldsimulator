name: Kéo Dữ Liệu & Quét Kho MongoDB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Cài đặt thư viện kết nối
        run: |
          python -m pip install --upgrade pip
          pip install pymongo

      - name: 📡 Quét Checklist và Lấy Dữ liệu
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python -c '
          import os, json
          from pymongo import MongoClient
          from pymongo.errors import OperationFailure

          print("Đang kết nối tới MongoDB...")
          uri = os.environ.get("MONGODB_URI")
          
          if not uri:
              print("❌ LỖI: Không tìm thấy MONGODB_URI trong Secrets.")
              exit(1)
              
          client = MongoClient(uri)
          
          inventory = {}
          db_names = []
          
          # 1. Thử lấy danh sách toàn bộ Database
          try:
              db_names = client.list_database_names()
              db_names = [db for db in db_names if db not in ["admin", "config", "local"]]
          except OperationFailure:
              print("⚠️ Không có quyền quét toàn bộ Cluster (do giới hạn phân quyền). Chỉ quét Database mặc định từ URI...")
              try:
                  default_db = client.get_default_database().name
                  db_names = [default_db]
              except Exception as e:
                  print(f"❌ Không xác định được DB: {e}")
                  exit(1)

          target_data = []
          target_db_name = ""

          # 2. Quét từng Database và Collection
          for db_name in db_names:
              inventory[db_name] = {}
              db = client[db_name]
              try:
                  colls = db.list_collection_names()
                  for coll_name in colls:
                      count = db[coll_name].count_documents({})
                      # Lấy 1 document làm mẫu để xem cấu trúc
                      sample = list(db[coll_name].find({}, {"_id": 0}).limit(1))
                      
                      inventory[db_name][coll_name] = {
                          "document_count": count,
                          "sample_document": sample[0] if sample else None
                      }
                      
                      # Tự động bắt mạch tìm dữ liệu cào
                      if coll_name in ["biology_rules", "content", "links", "keywords"] and count > 0:
                          # Ưu tiên gom bảng biology_rules
                          if coll_name == "biology_rules" or not target_data:
                              target_data = list(db[coll_name].find({}, {"_id": 0}))
                              target_db_name = f"{db_name}.{coll_name}"
              except Exception as e:
                  inventory[db_name]["error"] = str(e)

          os.makedirs("data", exist_ok=True)
          
          # 3. Xuất file Checklist (Inventory)
          with open("data/mongodb_inventory.json", "w", encoding="utf-8") as f:
              json.dump(inventory, f, ensure_ascii=False, indent=4)
          print("\n✅ Đã xuất Checklist các kho chứa: data/mongodb_inventory.json")

          # 4. Xuất file Dữ liệu cào
          if target_data:
              with open("data/scraped_data_dump.json", "w", encoding="utf-8") as f:
                  json.dump(target_data, f, ensure_ascii=False, indent=4)
              print(f"✅ Đã lôi thành công {len(target_data)} bản ghi từ [{target_db_name}] về: data/scraped_data_dump.json")
          else:
              print("⚠️ Không tìm thấy bảng biology_rules, content hoặc links nào có dữ liệu!")
          '

      - name: 💾 Commit & Push Kết Quả Lên GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ép Git nhận các file JSON trong thư mục data/ (Dùng -f để xuyên thủng .gitignore)
          git add -f data/mongodb_inventory.json data/scraped_data_dump.json 2>/dev/null || true
          
          if git status --porcelain | grep -qE '^[MADRC]'; then
            echo "📝 Có dữ liệu mới từ MongoDB, đang commit..."
            git commit -m "🤖 [Auto] Cập nhật dữ liệu & Checklist từ MongoDB - $(date +'%Y-%m-%d %H:%M UTC')"
            
            TOKEN="${{ secrets.GHT_PAT_RULES }}"
            if [ -z "$TOKEN" ]; then
              TOKEN="${{ secrets.GITHUB_TOKEN }}"
            fi
            
            git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}"
            
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
            
            echo "✅ Dữ liệu đã được push lên nhánh chính!"
          else
            echo "✅ Dữ liệu trên MongoDB không có gì mới so với file hiện tại."
          fi
          
